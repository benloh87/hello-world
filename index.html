<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World Davey 🌈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fredoka:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #87ceeb 0%, #b0e0ff 55%, #c8f0a0 100%);
      position: relative;
    }

    /* ── Sun ── */
    .sun {
      position: absolute;
      top: 6%;
      right: 8%;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, #fff176 0%, #ffd54f 60%, #ffb300 100%);
      border-radius: 50%;
      box-shadow: 0 0 60px 18px rgba(255, 213, 79, 0.7);
      animation: pulse 3s ease-in-out infinite;
    }
    .sun::before {
      content: "";
      position: absolute;
      inset: -35px;
      border-radius: 50%;
      background: conic-gradient(
        rgba(255,213,79,0.5) 0deg, transparent 15deg,
        rgba(255,213,79,0.5) 30deg, transparent 45deg,
        rgba(255,213,79,0.5) 60deg, transparent 75deg,
        rgba(255,213,79,0.5) 90deg, transparent 105deg,
        rgba(255,213,79,0.5) 120deg, transparent 135deg,
        rgba(255,213,79,0.5) 150deg, transparent 165deg,
        rgba(255,213,79,0.5) 180deg, transparent 195deg,
        rgba(255,213,79,0.5) 210deg, transparent 225deg,
        rgba(255,213,79,0.5) 240deg, transparent 255deg,
        rgba(255,213,79,0.5) 270deg, transparent 285deg,
        rgba(255,213,79,0.5) 300deg, transparent 315deg,
        rgba(255,213,79,0.5) 330deg, transparent 345deg
      );
      mask: radial-gradient(circle, transparent 60%, black 62%);
      -webkit-mask: radial-gradient(circle, transparent 60%, black 62%);
      animation: spin 20s linear infinite;
    }
    @keyframes pulse  { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes spin   { to { transform: rotate(360deg); } }

    /* ── Rainbow arc ── */
    .rainbow {
      position: absolute;
      bottom: -180px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle,
        transparent 0%, transparent 38%,
        #8b3fc7 38%, #8b3fc7 42%,
        #4a90e2 42%, #4a90e2 46%,
        #50c878 46%, #50c878 50%,
        #ffeb3b 50%, #ffeb3b 54%,
        #ff9800 54%, #ff9800 58%,
        #ff3d3d 58%, #ff3d3d 62%,
        transparent 62%);
      opacity: 0.85;
      pointer-events: none;
    }

    /* ── Clouds ── */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 100px;
      opacity: 0.9;
      box-shadow: 25px -15px 0 -5px white, 55px 0 0 -10px white, -25px -10px 0 -8px white;
    }
    .cloud-1 { top: 12%; left: 5%;  width: 80px;  height: 28px; animation: drift 25s linear infinite; }
    .cloud-2 { top: 25%; left: 65%; width: 60px;  height: 22px; animation: drift 35s linear infinite reverse; }
    .cloud-3 { top: 5%;  left: 38%; width: 100px; height: 34px; animation: drift 30s linear infinite; }
    @keyframes drift {
      from { transform: translateX(-150px); }
      to   { transform: translateX(calc(100vw + 150px)); }
    }

    /* ── Text block ── */
    .text-block {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05em;
      animation: bounce 2.2s ease-in-out infinite;
      margin-bottom: 150px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .word {
      display: flex;
      line-height: 1;
    }

    .word span {
      font-family: "Bungee Shade", cursive;
      font-size: 8.5vw;
      display: inline-block;
      -webkit-text-stroke: 2px #1a1a1a;
      text-shadow: 3px 3px 0 #1a1a1a, 5px 5px 0 rgba(0,0,0,0.2);
      paint-order: stroke fill;
      animation: wiggle 3s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50%       { transform: rotate(3deg); }
    }

    /* Hello — red/orange/yellow */
    .word-hello span:nth-child(1) { color: #e60000; animation-delay: 0.0s; }
    .word-hello span:nth-child(2) { color: #ff6f00; animation-delay: 0.1s; }
    .word-hello span:nth-child(3) { color: #ffd600; animation-delay: 0.2s; }
    .word-hello span:nth-child(4) { color: #00b341; animation-delay: 0.3s; }
    .word-hello span:nth-child(5) { color: #1565c0; animation-delay: 0.4s; }

    /* World — green/blue/purple */
    .word-world span:nth-child(1) { color: #6a1b9a; animation-delay: 0.1s; }
    .word-world span:nth-child(2) { color: #e60000; animation-delay: 0.2s; }
    .word-world span:nth-child(3) { color: #ff6f00; animation-delay: 0.3s; }
    .word-world span:nth-child(4) { color: #ffd600; animation-delay: 0.4s; }
    .word-world span:nth-child(5) { color: #00b341; animation-delay: 0.5s; }

    /* Davey — special pink/purple/blue for Davey! */
    .word-davey span:nth-child(1) { color: #e91e8c; animation-delay: 0.0s; }
    .word-davey span:nth-child(2) { color: #9c27b0; animation-delay: 0.15s; }
    .word-davey span:nth-child(3) { color: #1565c0; animation-delay: 0.3s; }
    .word-davey span:nth-child(4) { color: #00b341; animation-delay: 0.45s; }
    .word-davey span:nth-child(5) { color: #ff6f00; animation-delay: 0.6s; }

    /* ── Animals parade ── */
    .animals {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      z-index: 20;
      pointer-events: none;
      overflow: hidden;
    }
    .animal {
      position: absolute;
      bottom: 8px;
      font-size: 6rem;
      white-space: nowrap;
      animation: march linear infinite;
    }
    .animal span.label {
      font-family: "Fredoka", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      display: block;
      text-align: center;
      color: #333;
      margin-top: -8px;
    }

    .dino1    { animation-duration: 9s;  animation-delay: 0s;   }
    .trex     { animation-duration: 7s;  animation-delay: 2s;   }
    .snake1   { animation-duration: 11s; animation-delay: 1s;   }
    .capybara { animation-duration: 10s; animation-delay: 4s;   }
    .dino2    { animation-duration: 8s;  animation-delay: 6s;   }
    .snake2   { animation-duration: 13s; animation-delay: 9s;   }

    /* march + vertical hop for lively running feel */
    @keyframes march {
      0%   { transform: translateX(-200px) translateY(0px); }
      5%   { transform: translateX(calc(5vw))  translateY(-18px); }
      10%  { transform: translateX(calc(10vw)) translateY(0px); }
      15%  { transform: translateX(calc(15vw)) translateY(-18px); }
      20%  { transform: translateX(calc(20vw)) translateY(0px); }
      25%  { transform: translateX(calc(25vw)) translateY(-18px); }
      30%  { transform: translateX(calc(30vw)) translateY(0px); }
      35%  { transform: translateX(calc(35vw)) translateY(-18px); }
      40%  { transform: translateX(calc(40vw)) translateY(0px); }
      45%  { transform: translateX(calc(45vw)) translateY(-18px); }
      50%  { transform: translateX(calc(50vw)) translateY(0px); }
      55%  { transform: translateX(calc(55vw)) translateY(-18px); }
      60%  { transform: translateX(calc(60vw)) translateY(0px); }
      65%  { transform: translateX(calc(65vw)) translateY(-18px); }
      70%  { transform: translateX(calc(70vw)) translateY(0px); }
      75%  { transform: translateX(calc(75vw)) translateY(-18px); }
      80%  { transform: translateX(calc(80vw)) translateY(0px); }
      85%  { transform: translateX(calc(85vw)) translateY(-18px); }
      90%  { transform: translateX(calc(90vw)) translateY(0px); }
      95%  { transform: translateX(calc(95vw)) translateY(-18px); }
      100% { transform: translateX(calc(100vw + 200px)) translateY(0px); }
    }
  </style>
</head>
<body>
  <div class="sun"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="rainbow"></div>

  <div class="text-block">
    <div class="word word-hello">
      <span>H</span><span>e</span><span>l</span><span>l</span><span>o</span>
    </div>
    <div class="word word-world">
      <span>W</span><span>o</span><span>r</span><span>l</span><span>d</span>
    </div>
    <div class="word word-davey">
      <span>D</span><span>a</span><span>v</span><span>e</span><span>y</span>
    </div>
  </div>

  <!-- Animal parade -->
  <div class="animals">
    <div class="animal dino1">🦕<span class="label">Brontosaurus</span></div>
    <div class="animal trex">🦖<span class="label">T-Rex</span></div>
    <div class="animal snake1">🐍<span class="label">Ssssnake</span></div>
    <div class="animal capybara">
      <svg width="130" height="90" viewBox="0 0 52 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- body -->
        <ellipse cx="26" cy="22" rx="20" ry="12" fill="#8B6914"/>
        <!-- head -->
        <ellipse cx="44" cy="17" rx="9" ry="7" fill="#A07820"/>
        <!-- snout -->
        <ellipse cx="51" cy="19" rx="4" ry="3" fill="#C09030"/>
        <!-- nostril -->
        <circle cx="52" cy="18" r="1" fill="#5a3d00"/>
        <!-- eye -->
        <circle cx="47" cy="14" r="1.5" fill="#1a1a1a"/>
        <circle cx="47.5" cy="13.5" r="0.5" fill="white"/>
        <!-- ear -->
        <ellipse cx="42" cy="11" rx="3" ry="2" fill="#8B6914"/>
        <!-- legs -->
        <rect x="10" y="30" width="5" height="8" rx="2" fill="#7a5810"/>
        <rect x="20" y="31" width="5" height="7" rx="2" fill="#7a5810"/>
        <rect x="30" y="31" width="5" height="7" rx="2" fill="#7a5810"/>
        <rect x="38" y="30" width="5" height="8" rx="2" fill="#7a5810"/>
        <!-- tail -->
        <ellipse cx="7" cy="22" rx="3" ry="2" fill="#7a5810"/>
      </svg>
      <span class="label">Capybara</span>
    </div>
    <div class="animal dino2">🦕<span class="label">Diplodocus</span></div>
    <div class="animal snake2">🐍<span class="label">Python</span></div>
  </div>
</body>
</html>
