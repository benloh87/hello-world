<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World Davey 🌈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fredoka:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #87ceeb 0%, #b0e0ff 55%, #c8f0a0 100%);
      position: relative;
    }

    /* ── Sun ── */
    .sun {
      position: absolute; top: 6%; right: 8%;
      width: 110px; height: 110px;
      background: radial-gradient(circle, #fff176 0%, #ffd54f 60%, #ffb300 100%);
      border-radius: 50%;
      box-shadow: 0 0 60px 18px rgba(255,213,79,0.7);
      animation: pulse 3s ease-in-out infinite;
    }
    .sun::before {
      content: "";
      position: absolute; inset: -35px; border-radius: 50%;
      background: conic-gradient(
        rgba(255,213,79,0.5) 0deg, transparent 15deg, rgba(255,213,79,0.5) 30deg, transparent 45deg,
        rgba(255,213,79,0.5) 60deg, transparent 75deg, rgba(255,213,79,0.5) 90deg, transparent 105deg,
        rgba(255,213,79,0.5) 120deg, transparent 135deg, rgba(255,213,79,0.5) 150deg, transparent 165deg,
        rgba(255,213,79,0.5) 180deg, transparent 195deg, rgba(255,213,79,0.5) 210deg, transparent 225deg,
        rgba(255,213,79,0.5) 240deg, transparent 255deg, rgba(255,213,79,0.5) 270deg, transparent 285deg,
        rgba(255,213,79,0.5) 300deg, transparent 315deg, rgba(255,213,79,0.5) 330deg, transparent 345deg
      );
      mask: radial-gradient(circle, transparent 60%, black 62%);
      -webkit-mask: radial-gradient(circle, transparent 60%, black 62%);
      animation: spin 20s linear infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes spin  { to{transform:rotate(360deg)} }

    /* ── Rainbow arc ── */
    .rainbow {
      position: absolute; bottom: -180px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle,
        transparent 0%, transparent 38%, #8b3fc7 38%, #8b3fc7 42%,
        #4a90e2 42%, #4a90e2 46%, #50c878 46%, #50c878 50%,
        #ffeb3b 50%, #ffeb3b 54%, #ff9800 54%, #ff9800 58%,
        #ff3d3d 58%, #ff3d3d 62%, transparent 62%);
      opacity: 0.85; pointer-events: none;
    }

    /* ── Clouds ── */
    .cloud {
      position: absolute; background: white; border-radius: 100px; opacity: 0.9;
      box-shadow: 25px -15px 0 -5px white, 55px 0 0 -10px white, -25px -10px 0 -8px white;
    }
    .cloud-1 { top:12%; left:5%;  width:80px;  height:28px; animation: drift 25s linear infinite; }
    .cloud-2 { top:25%; left:65%; width:60px;  height:22px; animation: drift 35s linear infinite reverse; }
    .cloud-3 { top:5%;  left:38%; width:100px; height:34px; animation: drift 30s linear infinite; }
    @keyframes drift {
      from { transform: translateX(-150px); }
      to   { transform: translateX(calc(100vw + 150px)); }
    }

    /* ── Text block ── */
    .text-block {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 0.05em;
      animation: bounce 2.2s ease-in-out infinite;
      margin-bottom: 160px;
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .word { display: flex; line-height: 1; }
    .word span {
      font-family: "Bungee Shade", cursive;
      font-size: 8.5vw;
      display: inline-block;
      -webkit-text-stroke: 2px #1a1a1a;
      text-shadow: 3px 3px 0 #1a1a1a, 5px 5px 0 rgba(0,0,0,0.2);
      paint-order: stroke fill;
      animation: wiggle 3s ease-in-out infinite;
    }
    @keyframes wiggle { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
    .word-hello span:nth-child(1){color:#e60000;animation-delay:0.0s}
    .word-hello span:nth-child(2){color:#ff6f00;animation-delay:0.1s}
    .word-hello span:nth-child(3){color:#ffd600;animation-delay:0.2s}
    .word-hello span:nth-child(4){color:#00b341;animation-delay:0.3s}
    .word-hello span:nth-child(5){color:#1565c0;animation-delay:0.4s}
    .word-world span:nth-child(1){color:#6a1b9a;animation-delay:0.1s}
    .word-world span:nth-child(2){color:#e60000;animation-delay:0.2s}
    .word-world span:nth-child(3){color:#ff6f00;animation-delay:0.3s}
    .word-world span:nth-child(4){color:#ffd600;animation-delay:0.4s}
    .word-world span:nth-child(5){color:#00b341;animation-delay:0.5s}
    .word-davey span:nth-child(1){color:#e91e8c;animation-delay:0.0s}
    .word-davey span:nth-child(2){color:#9c27b0;animation-delay:0.15s}
    .word-davey span:nth-child(3){color:#1565c0;animation-delay:0.3s}
    .word-davey span:nth-child(4){color:#00b341;animation-delay:0.45s}
    .word-davey span:nth-child(5){color:#ff6f00;animation-delay:0.6s}

    /* ════════════════════════════
       ANIMALS
    ════════════════════════════ */

    /* Wrapper for animals running across the bottom */
    .runner {
      position: absolute;
      bottom: 12px;
      left: 0;
      z-index: 25;
      pointer-events: none;
    }
    /* Flip inner SVG for right-to-left animals */
    .runner .flip { transform: scaleX(-1); display: block; }

    /* Run left → right (hop every ~8% of progress) */
    @keyframes run-right {
      0%   { transform: translateX(-260px) translateY(0px); }
      4%   { transform: translateX(calc(4vw))  translateY(-32px); }
      8%   { transform: translateX(calc(8vw))  translateY(0px); }
      12%  { transform: translateX(calc(12vw)) translateY(-32px); }
      16%  { transform: translateX(calc(16vw)) translateY(0px); }
      20%  { transform: translateX(calc(20vw)) translateY(-32px); }
      24%  { transform: translateX(calc(24vw)) translateY(0px); }
      28%  { transform: translateX(calc(28vw)) translateY(-32px); }
      32%  { transform: translateX(calc(32vw)) translateY(0px); }
      36%  { transform: translateX(calc(36vw)) translateY(-32px); }
      40%  { transform: translateX(calc(40vw)) translateY(0px); }
      44%  { transform: translateX(calc(44vw)) translateY(-32px); }
      48%  { transform: translateX(calc(48vw)) translateY(0px); }
      52%  { transform: translateX(calc(52vw)) translateY(-32px); }
      56%  { transform: translateX(calc(56vw)) translateY(0px); }
      60%  { transform: translateX(calc(60vw)) translateY(-32px); }
      64%  { transform: translateX(calc(64vw)) translateY(0px); }
      68%  { transform: translateX(calc(68vw)) translateY(-32px); }
      72%  { transform: translateX(calc(72vw)) translateY(0px); }
      76%  { transform: translateX(calc(76vw)) translateY(-32px); }
      80%  { transform: translateX(calc(80vw)) translateY(0px); }
      84%  { transform: translateX(calc(84vw)) translateY(-32px); }
      88%  { transform: translateX(calc(88vw)) translateY(0px); }
      92%  { transform: translateX(calc(92vw)) translateY(-32px); }
      96%  { transform: translateX(calc(96vw)) translateY(0px); }
      100% { transform: translateX(calc(100vw + 260px)) translateY(0px); }
    }

    /* Run right → left */
    @keyframes run-left {
      0%   { transform: translateX(calc(100vw + 260px)) translateY(0px); }
      4%   { transform: translateX(calc(96vw)) translateY(-32px); }
      8%   { transform: translateX(calc(92vw)) translateY(0px); }
      12%  { transform: translateX(calc(88vw)) translateY(-32px); }
      16%  { transform: translateX(calc(84vw)) translateY(0px); }
      20%  { transform: translateX(calc(80vw)) translateY(-32px); }
      24%  { transform: translateX(calc(76vw)) translateY(0px); }
      28%  { transform: translateX(calc(72vw)) translateY(-32px); }
      32%  { transform: translateX(calc(68vw)) translateY(0px); }
      36%  { transform: translateX(calc(64vw)) translateY(-32px); }
      40%  { transform: translateX(calc(60vw)) translateY(0px); }
      44%  { transform: translateX(calc(56vw)) translateY(-32px); }
      48%  { transform: translateX(calc(52vw)) translateY(0px); }
      52%  { transform: translateX(calc(48vw)) translateY(-32px); }
      56%  { transform: translateX(calc(44vw)) translateY(0px); }
      60%  { transform: translateX(calc(40vw)) translateY(-32px); }
      64%  { transform: translateX(calc(36vw)) translateY(0px); }
      68%  { transform: translateX(calc(32vw)) translateY(-32px); }
      72%  { transform: translateX(calc(28vw)) translateY(0px); }
      76%  { transform: translateX(calc(24vw)) translateY(-32px); }
      80%  { transform: translateX(calc(20vw)) translateY(0px); }
      84%  { transform: translateX(calc(16vw)) translateY(-32px); }
      88%  { transform: translateX(calc(12vw)) translateY(0px); }
      92%  { transform: translateX(calc(8vw))  translateY(-32px); }
      96%  { transform: translateX(calc(4vw))  translateY(0px); }
      100% { transform: translateX(-260px) translateY(0px); }
    }

    /* Zoom toward camera — appears at horizon center, grows and charges toward viewer */
    .zoomer {
      position: absolute;
      z-index: 22;
      pointer-events: none;
    }
    /* Charge toward bottom-right */
    .zoomer-right {
      left: 42%;
      top: 42%;
    }
    @keyframes zoom-right {
      0%   { transform: translate(0,0) scale(0.07); opacity:0; }
      8%   { opacity: 1; }
      75%  { opacity: 1; }
      100% { transform: translate(380px, 280px) scale(3.2); opacity:0; }
    }
    /* Charge toward bottom-left */
    .zoomer-left {
      right: 42%;
      top: 42%;
      transform-origin: right center;
    }
    @keyframes zoom-left {
      0%   { transform: translate(0,0) scale(0.07) scaleX(-1); opacity:0; }
      8%   { opacity: 1; }
      75%  { opacity: 1; }
      100% { transform: translate(-380px, 280px) scale(3.2) scaleX(-1); opacity:0; }
    }
  </style>
</head>
<body>
  <div class="sun"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="rainbow"></div>

  <!-- ── TEXT ── -->
  <div class="text-block">
    <div class="word word-hello">
      <span>H</span><span>e</span><span>l</span><span>l</span><span>o</span>
    </div>
    <div class="word word-world">
      <span>W</span><span>o</span><span>r</span><span>l</span><span>d</span>
    </div>
    <div class="word word-davey">
      <span>D</span><span>a</span><span>v</span><span>e</span><span>y</span>
    </div>
  </div>

  <!-- ══════════════════════════════
       RUNNING ANIMALS (bottom strip)
  ══════════════════════════════ -->

  <!-- Brontosaurus → right, large -->
  <div class="runner" style="animation: run-right 9s linear infinite; animation-delay:0s;">
    <svg viewBox="0 0 200 115" width="200" height="115" xmlns="http://www.w3.org/2000/svg">
      <path d="M28,72 Q8,58 6,38" stroke="#3d7a2e" stroke-width="13" stroke-linecap="round" fill="none"/>

      <path d="M135,58 Q158,30 152,8" stroke="#52924a" stroke-width="15" stroke-linecap="round" fill="none"/>
      <ellipse cx="152" cy="7" rx="16" ry="11" fill="#68a858"/>
      <ellipse cx="165" cy="7" rx="5" ry="4" fill="#52924a"/>

      <path d="M158,11 Q163,15 168,12" stroke="#3a6a28" stroke-width="2" fill="none" stroke-linecap="round"/>
      <rect x="115" y="96" width="15" height="22" rx="7" fill="#3d7a2e"/>
      <rect x="96"  y="97" width="14" height="21" rx="7" fill="#3d7a2e"/>

      <rect x="47"  y="96" width="15" height="22" rx="7" fill="#3d7a2e"/>
      <ellipse cx="82" cy="70" rx="9" ry="6" fill="#3a6a28" opacity="0.4"/>
      <ellipse cx="108" cy="64" rx="11" ry="7" fill="#3a6a28" opacity="0.4"/>
    </svg>
  </div>

  <!-- T-Rex ← left (runs right-to-left, medium) -->
  <div class="runner" style="animation: run-left 7s linear infinite; animation-delay:2s; bottom:8px;">
    <div class="flip">
      <svg viewBox="0 0 130 145" width="90" height="130" xmlns="http://www.w3.org/2000/svg">

        <path d="M70,65 Q82,46 78,26" stroke="#2a7a35" stroke-width="16" stroke-linecap="round" fill="none"/>
        <ellipse cx="80" cy="16" rx="28" ry="14" fill="#35923e" transform="rotate(12,80,16)"/>
        <ellipse cx="82" cy="30" rx="26" ry="11" fill="#2a7a35" transform="rotate(22,82,35)"/>
        <path d="M88,28 L91,37 L95,27 L99,37 L103,27 L107,37 L111,27" stroke="white" stroke-width="2.5" fill="white"/>
        <circle cx="72" cy="11" r="5.5" fill="#1a1a1a"/>
        <circle cx="74" cy="9.5" r="1.8" fill="white"/>
        <path d="M78,73 L86,82 L81,88" stroke="#1d5e28" stroke-width="5" stroke-linecap="round" fill="none"/>
        <rect x="42" y="100" width="20" height="40" rx="8" fill="#1d5e28"/>
        <rect x="65" y="98"  width="20" height="38" rx="8" fill="#1d5e28" transform="rotate(-12,75,117)"/>
        <path d="M42,138 L34,150 M54,139 L60,150 M48,139 L48,150" stroke="#0d3e18" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Capybara → right, small-medium -->
  <div class="runner" style="animation: run-right 11s linear infinite; animation-delay:4.5s; bottom:10px;">
    <svg viewBox="0 0 155 95" width="130" height="80" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="32" width="95" height="48" rx="22" fill="#9a7030"/>
      <ellipse cx="10" cy="52" rx="10" ry="8" fill="#7a5520"/>
      <rect x="95" y="18" width="52" height="44" rx="14" fill="#b08840"/>
      <rect x="132" y="26" width="24" height="24" rx="10" fill="#c49a50"/>
      <circle cx="148" cy="31" r="3" fill="#6a3d10"/>
      <circle cx="148" cy="40" r="3" fill="#6a3d10"/>
      <circle cx="108" cy="25" r="4.5" fill="#1a1a1a"/>
      <circle cx="109.5" cy="23.5" r="1.5" fill="white"/>
      <ellipse cx="98" cy="14" rx="8" ry="6" fill="#9a7030"/>
      <ellipse cx="110" cy="13" rx="7" ry="5" fill="#9a7030"/>
      <rect x="22" y="73" width="15" height="22" rx="7" fill="#7a5218"/>
      <rect x="46" y="75" width="15" height="20" rx="7" fill="#7a5218"/>
      <rect x="70" y="75" width="15" height="20" rx="7" fill="#7a5218"/>
      <rect x="90" y="73" width="15" height="22" rx="7" fill="#7a5218"/>
      <rect x="28" y="55" width="75" height="20" rx="10" fill="#c8a060" opacity="0.4"/>
    </svg>
  </div>

  <!-- Snake ← left, long and low -->
  <div class="runner" style="animation: run-left 13s linear infinite; animation-delay:1s; bottom:14px;">
    <div class="flip">
      <svg viewBox="0 0 240 70" width="240" height="70" xmlns="http://www.w3.org/2000/svg">
        <path d="M12,50 Q50,8 90,38 Q130,65 170,35 Q200,18 225,28"
              stroke="#c0392b" stroke-width="18" stroke-linecap="round" fill="none"/>
        <path d="M12,50 Q50,8 90,38 Q130,65 170,35 Q200,18 225,28"
              stroke="#e8756a" stroke-width="9" stroke-linecap="round" fill="none"/>
        <path d="M25,50 Q50,25 62,36 M82,42 Q100,55 118,50 M145,42 Q162,30 180,34"
              stroke="#9b1e1e" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
        <ellipse cx="226" cy="27" rx="16" ry="11" fill="#c0392b"/>
        <ellipse cx="228" cy="25" rx="10" ry="7" fill="#d44030"/>
        <circle cx="232" cy="22" r="3.5" fill="#1a1a1a"/>
        <circle cx="233" cy="21" r="1.2" fill="#ffeb00"/>
        <path d="M238,27 L250,23 M238,27 L250,31" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Second T-Rex → right, smaller -->
  <div class="runner" style="animation: run-right 8s linear infinite; animation-delay:7s; bottom:6px;">
    <svg viewBox="0 0 130 145" width="70" height="100" xmlns="http://www.w3.org/2000/svg">
      <path d="M22,82 Q4,70 3,50" stroke="#5a3a00" stroke-width="14" stroke-linecap="round" fill="none"/>
      <ellipse cx="62" cy="82" rx="34" ry="22" fill="#7a5200" transform="rotate(-15,62,82)"/>
      <ellipse cx="62" cy="90" rx="24" ry="14" fill="#aa7a20" opacity="0.45" transform="rotate(-15,62,90)"/>
      <path d="M70,65 Q82,46 78,26" stroke="#7a5200" stroke-width="16" stroke-linecap="round" fill="none"/>
      <ellipse cx="80" cy="16" rx="28" ry="14" fill="#8a6210" transform="rotate(12,80,16)"/>
      <ellipse cx="82" cy="30" rx="26" ry="11" fill="#7a5200" transform="rotate(22,82,35)"/>
      <path d="M88,28 L91,37 L95,27 L99,37 L103,27 L107,37 L111,27" stroke="white" stroke-width="2.5" fill="white"/>
      <circle cx="72" cy="11" r="5.5" fill="#1a1a1a"/>
      <circle cx="74" cy="9.5" r="1.8" fill="white"/>

  </div>

  <!-- Second snake → right, tiny -->
  <div class="runner" style="animation: run-right 16s linear infinite; animation-delay:10s; bottom:16px;">
    <svg viewBox="0 0 240 70" width="150" height="44" xmlns="http://www.w3.org/2000/svg">

      <path d="M12,50 Q50,8 90,38 Q130,65 170,35 Q200,18 225,28"

  </div>

  <!-- ══════════════════════════════
       ZOOM-TOWARD-CAMERA ANIMALS
  ══════════════════════════════ -->

  <!-- Brontosaurus zooms toward bottom-right -->
  <div class="zoomer zoomer-right" style="animation: zoom-right 7s ease-in infinite; animation-delay: 1s;">
    <svg viewBox="0 0 200 115" width="200" height="115" xmlns="http://www.w3.org/2000/svg">
      <path d="M28,72 Q8,58 6,38" stroke="#3d7a2e" stroke-width="13" stroke-linecap="round" fill="none"/>
      <ellipse cx="95" cy="75" rx="60" ry="28" fill="#52924a"/>
      <ellipse cx="95" cy="84" rx="42" ry="16" fill="#76b85e" opacity="0.5"/>

      <circle cx="145" cy="4" r="3.5" fill="#1a1a1a"/>
      <circle cx="146" cy="3" r="1.1" fill="white"/>
      <rect x="115" y="96" width="15" height="22" rx="7" fill="#3d7a2e"/>
      <rect x="96"  y="97" width="14" height="21" rx="7" fill="#3d7a2e"/>
      <rect x="65"  y="97" width="14" height="21" rx="7" fill="#3d7a2e"/>
      <rect x="47"  y="96" width="15" height="22" rx="7" fill="#3d7a2e"/>
    </svg>
  </div>

  <!-- T-Rex zooms toward bottom-left -->
  <div class="zoomer zoomer-left" style="animation: zoom-left 9s ease-in infinite; animation-delay: 4s;">
